<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="264" viewBox="0 0 1000 264" role="img" aria-labelledby="title desc">
  <title id="title">Sha-Lai Berends profile header</title>
  <desc id="desc">Business Automation and Data Operations Builder.</desc>
  <!-- OPTICAL_GLASS_SYSTEM_START -->
  <defs>
    <clipPath id="glassPaneClip"><rect x="18" y="18" width="964" height="228" rx="34"/></clipPath>
    <clipPath id="canvasSafe"><rect x="2" y="2" width="996" height="260" rx="8"/></clipPath>
    <linearGradient id="opticalGlassBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".13"/>
      <stop offset=".34" stop-color="#FFFFFF" stop-opacity=".08"/>
      <stop offset=".68" stop-color="#F8FAFC" stop-opacity=".052"/>
      <stop offset="1" stop-color="#F3F4FA" stop-opacity=".032"/>
    </linearGradient>
    <linearGradient id="sideDepth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EAF2FF" stop-opacity=".12"/>
      <stop offset=".34" stop-color="#EDF0F8" stop-opacity=".085"/>
      <stop offset=".72" stop-color="#F3F4FA" stop-opacity=".032"/>
      <stop offset="1" stop-color="#F3F4FA" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ambientLight" cx="16%" cy="3%" r="72%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".17"/>
      <stop offset=".28" stop-color="#FFFFFF" stop-opacity=".048"/>
      <stop offset=".72" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lowerShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset=".68" stop-color="#111827" stop-opacity="0"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".052"/>
    </linearGradient>
    <linearGradient id="outerEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".82"/>
      <stop offset=".28" stop-color="#FFFFFF" stop-opacity=".48"/>
      <stop offset=".62" stop-color="#FFFFFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".13"/>
    </linearGradient>
    <linearGradient id="innerEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF2FF" stop-opacity=".34"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".17"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".08"/>
    </linearGradient>
    <linearGradient id="chipGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".20"/>
      <stop offset=".52" stop-color="#FFFFFF" stop-opacity=".125"/>
      <stop offset="1" stop-color="#EDF0F8" stop-opacity=".09"/>
    </linearGradient>
    <linearGradient id="chipEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".58"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".26"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".12"/>
    </linearGradient>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="suspensionShadow" x="-25%" y="-25%" width="150%" height="165%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="specularSoft" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>
  <g aria-hidden="true">
    <g clip-path="url(#canvasSafe)">
      <rect x="21" y="29" width="958" height="222" rx="34" fill="none" stroke="#111827" stroke-opacity=".10" stroke-width="5" filter="url(#suspensionShadow)"/>
      <rect x="20" y="23" width="960" height="224" rx="34" fill="none" stroke="#111827" stroke-opacity=".15" stroke-width="2" filter="url(#contactShadow)"/>
    </g>
    <rect x="18" y="18" width="964" height="228" rx="34" fill="url(#opticalGlassBody)"/>
    <g clip-path="url(#glassPaneClip)">
      <rect x="18" y="18" width="327.8" height="228" fill="url(#sideDepth)"/>
      <rect x="18" y="18" width="964" height="228" fill="url(#ambientLight)"/>
      <rect x="18" y="18" width="964" height="228" fill="url(#lowerShade)"/>
      <path d="M 26 22 V 226" fill="none" stroke="#1F2937" stroke-opacity=".055" stroke-width="2.2" filter="url(#specularSoft)"/>
    </g>
    <rect x="18.7" y="18.7" width="962.6" height="226.6" rx="34" fill="none" stroke="url(#outerEdge)" stroke-width="1.55"/>
    <rect x="20.2" y="20.2" width="959.6" height="223.6" rx="31.8" fill="none" stroke="url(#innerEdge)" stroke-width=".9"/>
    <path d="M 39.1 18.7 C 191.5 17.8, 307.2 18.2, 422.9 18.7" fill="none" stroke="#FFFFFF" stroke-opacity=".82" stroke-width="1.65" stroke-linecap="round" filter="url(#specularSoft)"/>
    <path d="M 29.6 44.5 C 17.8 68.2, 18.4 122.9, 19.0 159.4" fill="none" stroke="#FFFFFF" stroke-opacity=".52" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 919.1 18.7 C 941.9 18.0, 963.3 20.0, 971.8 30.9" fill="none" stroke="#FFFFFF" stroke-opacity=".68" stroke-width="1.45" stroke-linecap="round" filter="url(#specularSoft)"/>
    <path d="M 981.1 81.8 V 116.0" fill="none" stroke="#FFFFFF" stroke-opacity=".27" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 673.5 245.1 H 957.5" fill="none" stroke="#FFFFFF" stroke-opacity=".16" stroke-width="1" stroke-linecap="round"/>
    <path d="M 779.6 243.3 H 960.9 M 979.3 143.4 V 222.2" fill="none" stroke="#111827" stroke-opacity=".075" stroke-width="1.05" stroke-linecap="round"/>
    <path d="M 48 244.0 Q 76 241.0 110 244.0" fill="none" stroke="#FFFFFF" stroke-opacity=".13" stroke-width="1.2" stroke-linecap="round" filter="url(#specularSoft)"/>
  </g>
  <!-- OPTICAL_GLASS_SYSTEM_END -->

  <g>
    <text x="54" y="85" fill="#58A6FF" font-family="Consolas,Menlo,monospace" font-size="13" font-weight="700" letter-spacing="2">BERENDSSHALAI // SYSTEMS LAB</text>
    <text x="54" y="145" fill="#58636D" font-family="Arial,Helvetica,sans-serif" font-size="46" font-weight="800">Sha-Lai Berends</text>
    <text x="56" y="183" fill="#58636D" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="600">Business Automation &amp; Data Operations Builder</text>
    <text x="56" y="218" fill="#B7CCE0" font-family="Consolas,Menlo,monospace" font-size="12">OPERATIONS -&gt; EXPLICIT RULES -&gt; VALIDATED DATA -&gt; AUDITABLE SYSTEMS</text>
  </g>
  <g aria-hidden="true">
    <circle cx="916" cy="102" r="35" fill="url(#chipGlass)" stroke="url(#chipEdge)"/>
    <path d="M 891 82 Q 916 69 941 82" fill="none" stroke="#FFFFFF" stroke-opacity=".48" stroke-width="1" stroke-linecap="round"/>
  </g>
  <text x="916" y="108" text-anchor="middle" fill="#58636D" font-family="Consolas,Menlo,monospace" font-size="13" font-weight="800">SB</text>
</svg>
