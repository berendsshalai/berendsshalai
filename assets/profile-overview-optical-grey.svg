<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc">
  <!-- OPTICAL_GLASS_SYSTEM_START -->
  <defs>
    <clipPath id="glassPaneClip"><rect x="12" y="12" width="976" height="696" rx="36"/></clipPath>
    <clipPath id="canvasSafe"><rect x="2" y="2" width="996" height="716" rx="8"/></clipPath>
    <linearGradient id="opticalGlassBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".13"/>
      <stop offset=".34" stop-color="#FFFFFF" stop-opacity=".08"/>
      <stop offset=".68" stop-color="#F8FAFC" stop-opacity=".052"/>
      <stop offset="1" stop-color="#F3F4FA" stop-opacity=".032"/>
    </linearGradient>
    <linearGradient id="sideDepth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EAF2FF" stop-opacity=".12"/>
      <stop offset=".34" stop-color="#EDF0F8" stop-opacity=".085"/>
      <stop offset=".72" stop-color="#F3F4FA" stop-opacity=".032"/>
      <stop offset="1" stop-color="#F3F4FA" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ambientLight" cx="16%" cy="3%" r="72%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".17"/>
      <stop offset=".28" stop-color="#FFFFFF" stop-opacity=".048"/>
      <stop offset=".72" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lowerShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset=".68" stop-color="#111827" stop-opacity="0"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".052"/>
    </linearGradient>
    <linearGradient id="outerEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".82"/>
      <stop offset=".28" stop-color="#FFFFFF" stop-opacity=".48"/>
      <stop offset=".62" stop-color="#FFFFFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".13"/>
    </linearGradient>
    <linearGradient id="innerEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF2FF" stop-opacity=".34"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".17"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".08"/>
    </linearGradient>
    <linearGradient id="chipGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".20"/>
      <stop offset=".52" stop-color="#FFFFFF" stop-opacity=".125"/>
      <stop offset="1" stop-color="#EDF0F8" stop-opacity=".09"/>
    </linearGradient>
    <linearGradient id="chipEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".58"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".26"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".12"/>
    </linearGradient>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="suspensionShadow" x="-25%" y="-25%" width="150%" height="165%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="specularSoft" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>
  <g aria-hidden="true">
    <g clip-path="url(#canvasSafe)">
      <rect x="15" y="23" width="970" height="690" rx="36" fill="none" stroke="#111827" stroke-opacity=".10" stroke-width="5" filter="url(#suspensionShadow)"/>
      <rect x="14" y="17" width="972" height="692" rx="36" fill="none" stroke="#111827" stroke-opacity=".15" stroke-width="2" filter="url(#contactShadow)"/>
    </g>
    <rect x="12" y="12" width="976" height="696" rx="36" fill="url(#opticalGlassBody)"/>
    <g clip-path="url(#glassPaneClip)">
      <rect x="12" y="12" width="331.8" height="696" fill="url(#sideDepth)"/>
      <rect x="12" y="12" width="976" height="696" fill="url(#ambientLight)"/>
      <rect x="12" y="12" width="976" height="696" fill="url(#lowerShade)"/>
      <path d="M 20 16 V 688" fill="none" stroke="#1F2937" stroke-opacity=".055" stroke-width="2.2" filter="url(#specularSoft)"/>
    </g>
    <rect x="12.7" y="12.7" width="974.6" height="694.6" rx="36" fill="none" stroke="url(#outerEdge)" stroke-width="1.55"/>
    <rect x="14.2" y="14.2" width="971.6" height="691.6" rx="33.8" fill="none" stroke="url(#innerEdge)" stroke-width=".9"/>
    <path d="M 34.3 12.7 C 187.7 11.8, 304.8 12.2, 421.9 12.7" fill="none" stroke="#FFFFFF" stroke-opacity=".82" stroke-width="1.65" stroke-linecap="round" filter="url(#specularSoft)"/>
    <path d="M 24.2 40.1 C 11.8 165.1, 12.4 332.2, 13.0 443.5" fill="none" stroke="#FFFFFF" stroke-opacity=".52" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 921.4 12.7 C 945.5 12.0, 968.2 14.0, 977.2 25.7" fill="none" stroke="#FFFFFF" stroke-opacity=".68" stroke-width="1.45" stroke-linecap="round" filter="url(#specularSoft)"/>
    <path d="M 987.1 206.9 V 311.3" fill="none" stroke="#FFFFFF" stroke-opacity=".27" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 675.7 707.1 H 962.1" fill="none" stroke="#FFFFFF" stroke-opacity=".16" stroke-width="1" stroke-linecap="round"/>
    <path d="M 783.0 705.3 H 965.7 M 985.3 394.8 V 682.8" fill="none" stroke="#111827" stroke-opacity=".075" stroke-width="1.05" stroke-linecap="round"/>
    <path d="M 42 706.0 Q 70 703.0 104 706.0" fill="none" stroke="#FFFFFF" stroke-opacity=".13" stroke-width="1.2" stroke-linecap="round" filter="url(#specularSoft)"/>
  </g>
  <!-- OPTICAL_GLASS_SYSTEM_END -->

<title id="title">Profile overview blocks</title>
  <desc id="desc">Dark block layout describing profile, engineering direction, stack and operating principles. All text is wrapped within its card.</desc>
  <style>
    .bg{fill:none;stroke:none}.card{fill:url(#chipGlass);stroke:url(#chipEdge);stroke-width:1}.label{fill:#b7cce0;paint-order:stroke;stroke:#111827;stroke-opacity:.88;stroke-width:1.45;font:700 11px Consolas,monospace}.blue{fill:#58a6ff;paint-order:stroke;stroke:#07111f;stroke-opacity:.82;stroke-width:1.05}.white{fill:#58636d;paint-order:stroke;stroke:#f6f8fa;stroke-opacity:.78;stroke-width:1.15}.muted{fill:#b7cce0;paint-order:stroke;stroke:#111827;stroke-opacity:.88;stroke-width:1.45}.body{font:400 14px Arial,Helvetica,sans-serif}.head{font:800 24px Arial,Helvetica,sans-serif}.mid{font:700 17px Arial,Helvetica,sans-serif}.compact{font:700 15px Arial,Helvetica,sans-serif}
  </style>
  <text x="28" y="42" class="white head">Profile</text>
  <text x="28" y="68" class="muted body">I convert fragmented administrative work into structured, validated and auditable workflows.</text>

  <rect x="28" y="96" width="292" height="132" rx="12" class="card"/>
  <text x="46" y="124" class="label">OBSERVE</text>
  <text x="46" y="156" class="blue mid">Workflow discovery</text>
  <text x="46" y="184" class="muted body"><tspan x="46" dy="0">Find repeated manual steps and</tspan><tspan x="46" dy="20">hidden decision rules.</tspan></text>

  <rect x="354" y="96" width="292" height="132" rx="12" class="card"/>
  <text x="372" y="124" class="label">VALIDATE</text>
  <text x="372" y="156" class="blue mid">Data quality gates</text>
  <text x="372" y="184" class="muted body"><tspan x="372" dy="0">Make inputs explicit, testable and</tspan><tspan x="372" dy="20">privacy-safe.</tspan></text>

  <rect x="680" y="96" width="292" height="132" rx="12" class="card"/>
  <text x="698" y="124" class="label">AUTOMATE</text>
  <text x="698" y="156" class="blue mid">Exception workflows</text>
  <text x="698" y="184" class="muted body"><tspan x="698" dy="0">Remove repetition while keeping</tspan><tspan x="698" dy="20">human review visible.</tspan></text>

  <text x="28" y="278" class="white head">Current engineering direction</text>
  <rect x="28" y="304" width="292" height="88" rx="12" class="card"/><text x="46" y="332" class="label">WORKFORCE</text><text x="46" y="362" class="blue mid">Attendance reconciliation</text>
  <rect x="354" y="304" width="292" height="88" rx="12" class="card"/><text x="372" y="332" class="label">FINANCE OPS</text><text x="372" y="362" class="blue mid">Matching and exceptions</text>
  <rect x="680" y="304" width="292" height="88" rx="12" class="card"/><text x="698" y="332" class="label">RECRUITMENT</text><text x="698" y="362" class="blue mid">Validated intake routing</text>
  <rect x="28" y="410" width="292" height="88" rx="12" class="card"/><text x="46" y="438" class="label">DOCUMENTS</text><text x="46" y="468" class="blue mid">OCR and review queues</text>
  <rect x="354" y="410" width="292" height="88" rx="12" class="card"/><text x="372" y="438" class="label">COMMUNICATION</text><text x="372" y="468" class="blue mid">Auditable delivery</text>
  <rect x="680" y="410" width="292" height="88" rx="12" class="card"/><text x="698" y="438" class="label">EDUCATION</text><text x="698" y="468" class="blue mid">Case studies and guides</text>

  <text x="28" y="552" class="white head">Stack and operating principles</text>
  <rect x="28" y="578" width="210" height="92" rx="12" class="card"/><text x="46" y="606" class="label">CODE</text><text x="46" y="634" class="blue compact"><tspan x="46" dy="0">Python / TS / JS</tspan><tspan x="46" dy="20">Java</tspan></text>
  <rect x="258" y="578" width="210" height="92" rx="12" class="card"/><text x="276" y="606" class="label">DATA</text><text x="276" y="634" class="blue compact"><tspan x="276" dy="0">SQL / Excel</tspan><tspan x="276" dy="20">SQLite</tspan></text>
  <rect x="488" y="578" width="210" height="92" rx="12" class="card"/><text x="506" y="606" class="label">SYSTEMS</text><text x="506" y="634" class="blue compact"><tspan x="506" dy="0">MCP / CI</tspan><tspan x="506" dy="20">FastAPI</tspan></text>
  <rect x="718" y="578" width="254" height="92" rx="12" class="card"/><text x="736" y="606" class="label">PRINCIPLES</text><text x="736" y="634" class="blue compact"><tspan x="736" dy="0">Privacy / auditability</tspan><tspan x="736" dy="20">Validation</tspan></text>
</svg>
