<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="248" viewBox="0 0 1000 248" role="img" aria-labelledby="title desc">
  <!-- OPTICAL_GLASS_SYSTEM_START -->
  <defs>
    <clipPath id="glassPaneClip"><rect x="12" y="12" width="976" height="224" rx="27"/></clipPath>
    <clipPath id="canvasSafe"><rect x="2" y="2" width="996" height="244" rx="8"/></clipPath>
    <linearGradient id="opticalGlassBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".13"/>
      <stop offset=".34" stop-color="#FFFFFF" stop-opacity=".08"/>
      <stop offset=".68" stop-color="#3a434b" stop-opacity=".052"/>
      <stop offset="1" stop-color="#F3F4FA" stop-opacity=".032"/>
    </linearGradient>
    <linearGradient id="sideDepth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E7F8EC" stop-opacity=".14"/>
      <stop offset=".34" stop-color="#DFF7E7" stop-opacity=".09"/>
      <stop offset=".72" stop-color="#F3F4FA" stop-opacity=".032"/>
      <stop offset="1" stop-color="#F3F4FA" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ambientLight" cx="16%" cy="3%" r="72%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".17"/>
      <stop offset=".28" stop-color="#FFFFFF" stop-opacity=".048"/>
      <stop offset=".72" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lowerShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset=".68" stop-color="#111827" stop-opacity="0"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".052"/>
    </linearGradient>
    <linearGradient id="outerEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".82"/>
      <stop offset=".28" stop-color="#FFFFFF" stop-opacity=".48"/>
      <stop offset=".62" stop-color="#FFFFFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".13"/>
    </linearGradient>
    <linearGradient id="innerEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7EE787" stop-opacity=".46"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".17"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".08"/>
    </linearGradient>
    <linearGradient id="chipGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E7F8EC" stop-opacity=".22"/>
      <stop offset=".52" stop-color="#FFFFFF" stop-opacity=".125"/>
      <stop offset="1" stop-color="#DFF7E7" stop-opacity=".09"/>
    </linearGradient>
    <linearGradient id="chipEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7EE787" stop-opacity=".62"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".26"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".12"/>
    </linearGradient>
    <radialGradient id="emeraldField" cx="58%" cy="48%" r="70%">
      <stop offset="0" stop-color="#3FB950" stop-opacity=".075"/>
      <stop offset=".48" stop-color="#2EA043" stop-opacity=".025"/>
      <stop offset="1" stop-color="#2EA043" stop-opacity="0"/>
    </radialGradient>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="suspensionShadow" x="-25%" y="-25%" width="150%" height="165%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="specularSoft" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>
  <g aria-hidden="true">
    <g clip-path="url(#canvasSafe)">
      <rect x="15" y="23" width="970" height="218" rx="27" fill="none" stroke="#111827" stroke-opacity=".10" stroke-width="5" filter="url(#suspensionShadow)"/>
      <rect x="14" y="17" width="972" height="220" rx="27" fill="none" stroke="#111827" stroke-opacity=".15" stroke-width="2" filter="url(#contactShadow)"/>
    </g>
    <rect x="12" y="12" width="976" height="224" rx="27" fill="url(#opticalGlassBody)"/>
    <g clip-path="url(#glassPaneClip)">
      <rect x="12" y="12" width="331.8" height="224" fill="url(#sideDepth)"/>
      <rect x="12" y="12" width="976" height="224" fill="url(#ambientLight)"/>
      <rect x="12" y="12" width="976" height="224" fill="url(#lowerShade)"/>
      <rect x="12" y="12" width="976" height="224" fill="url(#emeraldField)"/>
      <path d="M 20 16 V 216" fill="none" stroke="#1F2937" stroke-opacity=".055" stroke-width="2.2" filter="url(#specularSoft)"/>
    </g>
    <rect x="12.7" y="12.7" width="974.6" height="222.6" rx="27" fill="none" stroke="url(#outerEdge)" stroke-width="1.55"/>
    <rect x="14.2" y="14.2" width="971.6" height="219.6" rx="24.8" fill="none" stroke="url(#innerEdge)" stroke-width=".9"/>
    <path d="M 46 218 H 382.9 M 753.8 32 H 954" fill="none" stroke="#3FB950" stroke-opacity=".24" stroke-width="1"/>
    <path d="M 28.7 12.7 C 187.7 11.8, 304.8 12.2, 421.9 12.7" fill="none" stroke="#FFFFFF" stroke-opacity=".82" stroke-width="1.65" stroke-linecap="round" filter="url(#specularSoft)"/>
    <path d="M 21.2 33.1 C 11.8 61.3, 12.4 115.0, 13.0 150.9" fill="none" stroke="#FFFFFF" stroke-opacity=".52" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 938.0 12.7 C 956.1 12.0, 973.1 14.0, 979.9 22.3" fill="none" stroke="#FFFFFF" stroke-opacity=".68" stroke-width="1.45" stroke-linecap="round" filter="url(#specularSoft)"/>
    <path d="M 987.1 74.7 V 108.3" fill="none" stroke="#FFFFFF" stroke-opacity=".27" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 675.7 235.1 H 968.6" fill="none" stroke="#FFFFFF" stroke-opacity=".16" stroke-width="1" stroke-linecap="round"/>
    <path d="M 783.0 233.3 H 971.3 M 985.3 135.2 V 217.1" fill="none" stroke="#111827" stroke-opacity=".075" stroke-width="1.05" stroke-linecap="round"/>
    <path d="M 42 234.0 Q 70 231.0 104 234.0" fill="none" stroke="#FFFFFF" stroke-opacity=".13" stroke-width="1.2" stroke-linecap="round" filter="url(#specularSoft)"/>
  </g>
  <!-- OPTICAL_GLASS_SYSTEM_END -->

<title id="title">Publication boundary</title>
  <desc id="desc">Clean-room publication boundary for public systems.</desc>
  <style>.bg{fill:none;stroke:none}.card{fill:url(#chipGlass);stroke:url(#chipEdge);stroke-width:1}.label{fill:#66707a;font:700 11px "IBM Plex Mono","JetBrains Mono",Consolas,Menlo,monospace;letter-spacing:.6px}.white{fill:#3a434b}.muted{fill:#66707a}.body{font:400 15px Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.head{font:600 23px "Space Grotesk",Inter,Arial,sans-serif}</style>
  <text x="28" y="44" class="label">PUBLICATION BOUNDARY</text>
  <text x="28" y="82" class="white head">Build the rule. Validate the data. Preserve the evidence.</text>
  <text x="28" y="112" class="white head">Remove the repetition.</text>
  <rect x="28" y="138" width="944" height="80" rx="12" class="card"/>
  <text x="48" y="170" class="muted body">Independent clean-room systems with synthetic examples; no employer-owned source,</text>
  <text x="48" y="196" class="muted body">internal names, private business data, credentials or proprietary documents.</text>

  <!-- EMERALD_OBSERVATORY_THEME_START -->
  <style>
    :root{color-scheme:light dark}
    .blue,.label,.handle{fill:#3FB950!important}
    .ascii{fill:#2F8F46!important;font-family:"IBM Plex Mono","JetBrains Mono",Consolas,Menlo,monospace}
    .white,.value,.stackLabel{fill:#3A434B!important}
    .muted,.rule{fill:#66707A!important}
    @media (prefers-color-scheme:dark){
      .white,.value,.stackLabel{fill:#E6EDF3!important}
      .muted,.rule{fill:#A8B3BC!important}
      .ascii{fill:#7EE787!important}
      .blue,.label,.handle{fill:#56D364!important}
    }
  </style>
  <!-- EMERALD_OBSERVATORY_THEME_END -->
</svg>
