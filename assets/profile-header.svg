<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="264" viewBox="0 0 1000 264" role="img" aria-labelledby="title desc">
  <title id="title">Sha-Lai Berends glass profile header</title>
  <desc id="desc">Business Automation and Data Operations Builder.</desc>

  <!-- GLASS_PROFILE_THEME -->
  <defs>
    <linearGradient id="glassPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6f3ff" stop-opacity=".16"/>
      <stop offset=".46" stop-color="#7dbdff" stop-opacity=".07"/>
      <stop offset="1" stop-color="#071426" stop-opacity=".5"/>
    </linearGradient>
    <radialGradient id="glassGlow" cx="82%" cy="12%" r="72%">
      <stop offset="0" stop-color="#58a6ff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <filter id="glassSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <image x="0" y="0" width="1000" height="264" preserveAspectRatio="xMidYMid slice" href="data:image/jpeg;base64,"/>
  <rect x="0" y="0" width="1000" height="264" fill="#020713" opacity=".4"/>
  <ellipse cx="840" cy="34" rx="280" ry="145" fill="url(#glassGlow)" filter="url(#glassSoftGlow)"/>

  <rect x="18" y="18" width="964" height="228" rx="30" fill="url(#glassPanel)" stroke="#d9edff" stroke-opacity=".7" stroke-width="2"/>
  <path d="M50 52 H950" stroke="#ffffff" stroke-opacity=".32"/>
  <text x="54" y="85" fill="#9ccaff" font-family="Consolas,Menlo,monospace" font-size="13" font-weight="700" letter-spacing="2">BERENDSSHALAI // SYSTEMS LAB</text>
  <text x="54" y="145" fill="#f7fbff" font-family="Arial,Helvetica,sans-serif" font-size="46" font-weight="800">Sha-Lai Berends</text>
  <text x="56" y="183" fill="#d9eaff" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="600">Business Automation &amp; Data Operations Builder</text>
  <text x="56" y="218" fill="#9cb7d4" font-family="Consolas,Menlo,monospace" font-size="12">OPERATIONS -&gt; EXPLICIT RULES -&gt; VALIDATED DATA -&gt; AUDITABLE SYSTEMS</text>
  <circle cx="916" cy="102" r="35" fill="#58a6ff" fill-opacity=".1" stroke="#9ccaff" stroke-opacity=".65"/>
  <text x="916" y="108" text-anchor="middle" fill="#dceeff" font-family="Consolas,Menlo,monospace" font-size="13" font-weight="800">SB</text>
</svg>
