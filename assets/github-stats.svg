<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="290" viewBox="0 0 1000 290" role="img" aria-labelledby="title description">
  <title id="title">GitHub profile statistics awaiting first refresh</title>
  <desc id="description">Run the included GitHub Actions workflow to populate live values.</desc>
  <style>
    .background { fill: #0d1117; stroke: #30363d; }
    .metric-bg { fill: #161b22; stroke: #30363d; }
    .heading { fill: #f0f6fc; font: 700 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .subheading { fill: #8b949e; font: 400 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .metric-label { fill: #8b949e; font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: .6px; }
    .metric-value { fill: #58a6ff; font: 700 25px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
  <rect x="1" y="1" width="998" height="288" rx="16" class="background"/>
  <text x="28" y="38" class="heading">berendsshalai / GitHub activity</text>
  <text x="28" y="62" class="subheading">Run "Refresh profile statistics" once after uploading these files.</text>
  <g transform="translate(28 83)"><rect width="292" height="78" rx="12" class="metric-bg"/><text x="18" y="25" class="metric-label">REPOSITORIES</text><text x="18" y="56" class="metric-value">--</text></g>
  <g transform="translate(354 83)"><rect width="292" height="78" rx="12" class="metric-bg"/><text x="18" y="25" class="metric-label">STARS</text><text x="18" y="56" class="metric-value">--</text></g>
  <g transform="translate(680 83)"><rect width="292" height="78" rx="12" class="metric-bg"/><text x="18" y="25" class="metric-label">FOLLOWERS</text><text x="18" y="56" class="metric-value">--</text></g>
  <g transform="translate(28 177)"><rect width="292" height="78" rx="12" class="metric-bg"/><text x="18" y="25" class="metric-label">CONTRIBUTIONS / 365D</text><text x="18" y="56" class="metric-value">--</text></g>
  <g transform="translate(354 177)"><rect width="292" height="78" rx="12" class="metric-bg"/><text x="18" y="25" class="metric-label">COMMITS / 365D</text><text x="18" y="56" class="metric-value">--</text></g>
  <g transform="translate(680 177)"><rect width="292" height="78" rx="12" class="metric-bg"/><text x="18" y="25" class="metric-label">SOURCE LINES / EST.</text><text x="18" y="56" class="metric-value">--</text></g>
</svg>
