<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="384" viewBox="0 0 1000 384" role="img" aria-labelledby="title description">
  <title id="title">Live GitHub statistics for berendsshalai</title>
  <desc id="description">Repositories, stars, followers, trailing 365-day contributions and commits, estimated source lines, and an activity-based lifetime GitHub-hours estimate.</desc>
  <style>
