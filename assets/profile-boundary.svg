<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="248" viewBox="0 0 1000 248" role="img" aria-labelledby="title desc">
  <!-- GLASS_PROFILE_THEME -->
  <defs>
    <linearGradient id="glassPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6f3ff" stop-opacity=".16"/>
      <stop offset=".46" stop-color="#7dbdff" stop-opacity=".07"/>
      <stop offset="1" stop-color="#071426" stop-opacity=".5"/>
    </linearGradient>
    <radialGradient id="glassGlow" cx="82%" cy="12%" r="72%">
      <stop offset="0" stop-color="#58a6ff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <filter id="glassSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <image x="0" y="0" width="1000" height="248" preserveAspectRatio="xMidYMid slice" href="data:image/jpeg;base64,"/>
  <rect x="0" y="0" width="1000" height="248" fill="#020713" opacity=".4"/>
  <ellipse cx="840" cy="32" rx="280" ry="136" fill="url(#glassGlow)" filter="url(#glassSoftGlow)"/>

  <title id="title">Publication boundary</title>
  <desc id="desc">Clean-room publication boundary for public systems.</desc>
  <style>.bg{fill:url(#glassPanel);stroke:#d6ebff;stroke-opacity:.62;stroke-width:1.3}.card{fill:#d9edff;fill-opacity:.075;stroke:#d6ebff;stroke-opacity:.27}.label{fill:#afc8e3;font:700 11px Consolas,monospace;letter-spacing:.6px}.white{fill:#f7fbff}.muted{fill:#afc8e3}.body{font:400 15px Arial,Helvetica,sans-serif}.head{font:800 23px Arial,Helvetica,sans-serif}</style>
  <rect x="1" y="1" width="998" height="246" rx="16" class="bg"/>
  <text x="28" y="44" class="label">PUBLICATION BOUNDARY</text>
  <text x="28" y="82" class="white head">Build the rule. Validate the data. Preserve the evidence.</text>
  <text x="28" y="112" class="white head">Remove the repetition.</text>
  <rect x="28" y="138" width="944" height="80" rx="12" class="card"/>
  <text x="48" y="170" class="muted body">Independent clean-room systems with synthetic examples; no employer-owned source,</text>
  <text x="48" y="196" class="muted body">internal names, private business data, credentials or proprietary documents.</text>
<path d="M 28 5 H 972" stroke="#ffffff" stroke-opacity=".28" stroke-width="1.4"/>
</svg>
