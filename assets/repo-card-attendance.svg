<svg xmlns="http://www.w3.org/2000/svg" width="490" height="170" viewBox="0 0 490 170" role="img" aria-labelledby="title desc">
  <!-- GLASS_PROFILE_THEME -->
  <defs>
    <linearGradient id="glassPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6f3ff" stop-opacity=".16"/>
      <stop offset=".46" stop-color="#7dbdff" stop-opacity=".07"/>
      <stop offset="1" stop-color="#071426" stop-opacity=".5"/>
    </linearGradient>
    <radialGradient id="glassGlow" cx="82%" cy="12%" r="72%">
      <stop offset="0" stop-color="#58a6ff" stop-opacity=".28"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <filter id="glassSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <image x="0" y="0" width="490" height="170" preserveAspectRatio="xMidYMid slice" href="data:image/jpeg;base64,"/>
  <rect x="0" y="0" width="490" height="170" fill="#020713" opacity=".4"/>
  <ellipse cx="412" cy="22" rx="137" ry="94" fill="url(#glassGlow)" filter="url(#glassSoftGlow)"/>

  <title id="title">Attendance Reconciliation Engine</title><desc id="desc">Repository card for Attendance Reconciliation Engine.</desc>
  <style>.bg{fill:url(#glassPanel);stroke:#d6ebff;stroke-opacity:.62;stroke-width:1.3}.label{fill:#afc8e3;font:700 11px Consolas,monospace}.blue{fill:#58a6ff}.white{fill:#f7fbff}.muted{fill:#afc8e3}.body{font:400 14px Arial,Helvetica,sans-serif}.head{font:800 22px Arial,Helvetica,sans-serif}</style>
  <rect x="1" y="1" width="488" height="168" rx="14" class="bg"/>
  <text x="22" y="38" class="label">ROSTER / ATTENDANCE SYSTEM</text>
  <text x="22" y="74" class="white head">Attendance Reconciliation</text>
  <text x="22" y="104" class="blue body">Coverage rules, clock events, exceptions, tests and Pages.</text>
  <text x="22" y="138" class="muted body">Open repository -></text>
<path d="M 28 5 H 462" stroke="#ffffff" stroke-opacity=".28" stroke-width="1.4"/>
</svg>
