    </g>
    <rect x="12.7" y="12.7" width="974.6" height="104.6" rx="16" fill="none" stroke="url(#outerEdge)" stroke-width="1.55"/>
    <rect x="14.2" y="14.2" width="971.6" height="101.6" rx="13.8" fill="none" stroke="url(#innerEdge)" stroke-width=".9"/>
