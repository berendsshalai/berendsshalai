    <path d="M 17.4 24.5 C 11.8 35.3, 12.4 60.8, 13.0 77.7" fill="none" stroke="#FFFFFF" stroke-opacity=".52" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 958.4 12.7 C 969.1 12.0, 979.2 14.0, 983.2 18.1" fill="none" stroke="#FFFFFF" stroke-opacity=".68" stroke-width="1.45" stroke-linecap="round" filter="url(#specularSoft)"/>
    <path d="M 987.1 41.7 V 57.6" fill="none" stroke="#FFFFFF" stroke-opacity=".27" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 675.7 117.1 H 976.5" fill="none" stroke="#FFFFFF" stroke-opacity=".16" stroke-width="1" stroke-linecap="round"/>
    <path d="M 783.0 115.3 H 978.1 M 985.3 70.3 V 106.8" fill="none" stroke="#111827" stroke-opacity=".075" stroke-width="1.05" stroke-linecap="round"/>
    <path d="M 42 116.0 Q 70 113.0 104 116.0" fill="none" stroke="#FFFFFF" stroke-opacity=".13" stroke-width="1.2" stroke-linecap="round" filter="url(#specularSoft)"/>
  </g>
  <!-- OPTICAL_GLASS_SYSTEM_END -->

<title id="title">Portfolio website</title><desc id="desc">Portfolio website contact card.</desc><style>.bg{fill:none;stroke:none}.label{fill:#b7cce0;paint-order:stroke;stroke:#111827;stroke-opacity:.88;stroke-width:1.45;font:700 11px Consolas,monospace}.blue{fill:#58a6ff;paint-order:stroke;stroke:#07111f;stroke-opacity:.82;stroke-width:1.05}.white{fill:#dce9f6;paint-order:stroke;stroke:#111827;stroke-opacity:.92;stroke-width:1.65}.body{font:800 24px Arial,Helvetica,sans-serif}</style><text x="28" y="38" class="label">FEATURED PORTFOLIO</text><text x="28" y="76" class="white body">Sha-Lai Berends portfolio website</text><text x="28" y="104" class="blue label">Open live portfolio -></text>
