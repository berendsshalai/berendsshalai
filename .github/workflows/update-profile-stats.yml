name: Refresh profile statistics

on:
  workflow_dispatch:
  schedule:
    # Daily at 04:17 UTC. Non-round minutes reduce peak scheduler congestion.
    - cron: "17 4 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/generate_profile_stats.py"
      - ".github/workflows/update-profile-stats.yml"

permissions:
  contents: write

concurrency:
  group: profile-statistics
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate live statistics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: berendsshalai
        run: |
          python -m pip install --disable-pip-version-check "Pillow==11.3.0"
          python scripts/generate_profile_stats.py

      - name: Validate transparent optical-glass assets
        run: python scripts/validate_optical_glass.py

      - name: Commit refreshed assets
        shell: bash
        run: |
          if git diff --quiet -- README.md assets/github-stats.svg assets/ascii-stats-gallery.gif data/github-stats.json; then
            echo "No profile-stat changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/github-stats.svg assets/ascii-stats-gallery.gif data/github-stats.json
          git commit -m "chore(profile): refresh live GitHub statistics"
          git push
